<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>notes-kb chat</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161922;
      --border: #242838;
      --text: #e6e8ef;
      --muted: #8a91a3;
      --accent: #7aa2ff;
      --tool: #f0c987;
      --user: #2a3147;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { margin: 14px 0; display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user .bubble {
      background: var(--user);
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .tool {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: var(--tool);
      background: rgba(240, 201, 135, 0.08);
      border: 1px solid rgba(240, 201, 135, 0.25);
      padding: 6px 10px;
      border-radius: 8px;
      margin: 8px 0;
      word-break: break-all;
    }
    .status {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      margin: 8px 0;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      background: var(--panel);
    }
    form { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
    input[type=text] {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
    }
    input[type=text]:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent);
      color: var(--bg);
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .examples {
      max-width: 820px;
      margin: 0 auto 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .examples code {
      background: var(--panel);
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .examples code:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>notes-kb chat</h1>
    <div class="sub">Claude Haiku 4.5 + MCP</div>
  </header>

  <main id="log">
    <div class="examples">
      Try:
      <code data-q="What notes do I have?">What notes do I have?</code> ·
      <code data-q="Search my notes for MCP and summarise them">Summarise my MCP notes</code> ·
      <code data-q="Add a note titled 'web UI' with body 'shipped a chat interface today'">Add a note</code>
    </div>
  </main>

  <footer>
    <form id="form">
      <input id="prompt" type="text" placeholder="Ask the notes assistant…" autocomplete="off" autofocus>
      <button id="send" type="submit">Send</button>
    </form>
  </footer>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');

function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="bubble"></div>';
  div.querySelector('.bubble').textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function newAssistantBubble() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="bubble"></div>';
  log.appendChild(div);
  return div.querySelector('.bubble');
}

function addTool(name, input) {
  const div = document.createElement('div');
  div.className = 'tool';
  div.textContent = `→ ${name}(${JSON.stringify(input)})`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addStatus(text) {
  const div = document.createElement('div');
  div.className = 'status';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function send(prompt) {
  addUser(prompt);
  sendBtn.disabled = true;
  promptEl.disabled = true;

  let bubble = null;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt}),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const frames = buffer.split('\n\n');
      buffer = frames.pop();
      for (const frame of frames) {
        if (!frame.startsWith('data: ')) continue;
        const event = JSON.parse(frame.slice(6));
        if (event.type === 'text') {
          if (!bubble) bubble = newAssistantBubble();
          bubble.textContent += event.text;
          log.scrollTop = log.scrollHeight;
        } else if (event.type === 'tool_use') {
          bubble = null;
          addTool(event.name, event.input);
        } else if (event.type === 'status') {
          addStatus(event.text);
        }
      }
    }
  } catch (err) {
    addStatus(`error: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
    promptEl.disabled = false;
    promptEl.focus();
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const prompt = promptEl.value.trim();
  if (!prompt) return;
  promptEl.value = '';
  send(prompt);
});

document.addEventListener('click', (e) => {
  if (e.target.matches('.examples code[data-q]')) {
    promptEl.value = e.target.dataset.q;
    promptEl.focus();
  }
});
</script>
</body>
</html>
